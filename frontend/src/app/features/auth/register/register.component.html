<div class="register-container">
    <mat-card class="register-card">
        <mat-card-header>
            <mat-card-title>Student Registration</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
                <mat-form-field appearance="outline">
                    <mat-label>Full Name</mat-label>
                    <input matInput formControlName="name">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>College ID</mat-label>
                    <input matInput formControlName="collegeId">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password">
                </mat-form-field>

                <!-- placeholders for dynamic data -->
                <mat-form-field appearance="outline">
                    <mat-label>Course</mat-label>
                    <mat-select formControlName="courseId">
                        <mat-option [value]="1">B.Tech</mat-option>
                        <mat-option [value]="2">M.Tech</mat-option>
                    </mat-select>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit"
                    [disabled]="registerForm.invalid">Register</button>
            </form>
            <p class="login-link">
                Already have an account? <a routerLink="/login">Login here</a>
            </p>
        </mat-card-content>
    </mat-card>
</div>
