<div class="profile-container">
    <mat-card class="profile-card">
        <mat-card-header>
            <mat-icon mat-card-avatar class="profile-avatar">account_circle</mat-icon>
            <mat-card-title>{{ user.name }}</mat-card-title>
            <mat-card-subtitle>{{ user.collegeId }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content class="profile-content">
            <p><strong>Role:</strong> {{ user.role }}</p>
            <p *ngIf="user.email"><strong>Email:</strong> {{ user.email }}</p>
        </mat-card-content>
    </mat-card>
</div>
